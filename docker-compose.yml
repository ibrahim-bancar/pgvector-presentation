services:
  pgvector-db:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: pgvector-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pgvectordb
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./sql:/sql

volumes:
  pgvector_data:
